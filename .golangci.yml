version: "2"
linters:
  default: none
  enable:
    - asciicheck
    - bodyclose
    - durationcheck
    - govet
    - ineffassign
    - misspell
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
  settings:
    dupl:
      threshold: 100
    goconst:
      min-len: 2
      min-occurrences: 2
    gocritic:
      disabled-checks:
        - wrapperFunc
      enabled-tags:
        - performance
        - style
        - experimental
    gocyclo:
      min-complexity: 10
    lll:
      line-length: 140
    misspell:
      locale: US
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - gosec
        text: weak cryptographic primitive
      - linters:
          - staticcheck
        text: 'SA1019:'
      - linters:
          - errcheck
          - gosec
          - govet
          - rowserrcheck
        path: _test\.go
    paths:
      - third_party$
      - builtin$
formatters:
  enable:
    - gofmt
  settings:
    goimports:
      local-prefixes:
        - seata.apache.org/seata-go
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
# golangci.com configuration
# https://github.com/golangci/golangci/wiki/Configuration